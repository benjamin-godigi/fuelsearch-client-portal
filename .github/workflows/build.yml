name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
