name: Deploy staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to staging
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.CPANEL_FTP_STAGING_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set net:max-retries 2
          set net:timeout 30
          mirror --reverse --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob vendor/ \
            --exclude-glob .env \
            ./ "$FTP_TARGET_DIR"
          bye
          EOF
